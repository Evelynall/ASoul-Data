name: 更新录播链接

on:
  schedule:
    # 每天北京时间早上1点运行（UTC时间17点）
    - cron: '0 17 * * *'
    # 每天北京时间早上5点运行（UTC时间21点）
    - cron: '0 21 * * *'
    # 每天北京时间中午12点运行（UTC时间4点）
    - cron: '0 4 * * *'
    # 每天北京时间下午5点运行（UTC时间9点）
    - cron: '0 9 * * *'
    # 每天北京时间晚上9点运行（UTC时间13点）
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  fetch-replay-links:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 安装依赖
        run: npm install

      - name: 运行录播链接获取脚本
        env:
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        run: node scripts/fetch-replay-links.js

      - name: 提交更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add base-schedules.json

          if git diff --staged --quiet; then
            echo "没有检测到文件变化"
            exit 0
          fi

          git commit -m "自动更新录播链接 $(date +'%Y-%m-%d %H:%M:%S')"
          echo "已提交更改"

      - name: 推送更改
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
